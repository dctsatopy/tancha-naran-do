{% extends "base.html" %}
{% block title %}ダッシュボード — たんちゃーならんど{% endblock %}
{% block content %}

<div class="d-flex align-items-center justify-content-between mb-4">
  <h4 class="mb-0"><i class="bi bi-graph-up me-2"></i>感情ダッシュボード</h4>
  <div class="btn-group" role="group">
    <button type="button" class="btn btn-outline-primary btn-sm active" id="btn-7" onclick="loadChart(7)">7日</button>
    <button type="button" class="btn btn-outline-primary btn-sm" id="btn-30" onclick="loadChart(30)">30日</button>
  </div>
</div>

<div class="row g-4">
  <!-- 総合スコア折れ線グラフ -->
  <div class="col-12">
    <div class="card shadow-sm">
      <div class="card-header">
        <i class="bi bi-activity me-2"></i>総合スコアの推移
      </div>
      <div class="card-body">
        <canvas id="overallChart" height="100"></canvas>
      </div>
    </div>
  </div>

  <!-- カテゴリ別スコアの折れ線グラフ -->
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-header">
        <i class="bi bi-bar-chart-line me-2"></i>カテゴリ別スコアの推移
      </div>
      <div class="card-body">
        <canvas id="categoryChart" height="120"></canvas>
      </div>
    </div>
  </div>

  <!-- レーダーチャート（直近平均） -->
  <div class="col-lg-4">
    <div class="card shadow-sm">
      <div class="card-header">
        <i class="bi bi-diagram-3 me-2"></i>直近の感情バランス
      </div>
      <div class="card-body d-flex align-items-center justify-content-center">
        <canvas id="radarChart" width="260" height="260"></canvas>
      </div>
    </div>
  </div>

  <!-- チェックイン履歴テーブル -->
  <div class="col-12">
    <div class="card shadow-sm">
      <div class="card-header">
        <i class="bi bi-list-check me-2"></i>チェックイン履歴
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>日時</th>
                <th>ステータス</th>
                <th>総合スコア</th>
              </tr>
            </thead>
            <tbody id="history-table">
              <tr><td colspan="3" class="text-center text-muted py-3">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script src="/static/js/dashboard.js"></script>
{% endblock %}
