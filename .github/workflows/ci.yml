name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: tancha-naran-do:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (start container and check health)
        run: |
          docker run -d --name test-app -p 8080:8000 \
            -e DATABASE_URL=sqlite:////tmp/tancha.db \
            tancha-naran-do:ci
          sleep 5
          curl -f http://localhost:8080/ || (docker logs test-app && exit 1)
          docker stop test-app
