# Alembic 設定ファイル
# 使用方法:
#   alembic revision --autogenerate -m "説明"  # マイグレーションファイル生成
#   alembic upgrade head                        # 最新まで適用
#   alembic downgrade -1                        # 1世代前に戻す

[alembic]
script_location = alembic
prepend_sys_path = .

# DATABASE_URL 環境変数で上書き可能（alembic/env.py 参照）
sqlalchemy.url = sqlite:///./data/tancha.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
